# CyberMarketTrack — déploiement en UNE commande, sans .env à préparer.
#
#   docker compose up -d --build
#
# Aucun fichier .env n'est requis : des valeurs par défaut sont fournies
# ci-dessous et AUTH_SECRET (secret de session) est généré automatiquement au
# premier démarrage puis persisté dans ./data. Le dossier ./data (base SQLite)
# est créé automatiquement par Docker.
#
# Connexion sur /login avec ADMIN_USERNAME / ADMIN_PASSWORD : sur une base
# vierge, le compte admin est créé automatiquement au premier login.
#
# Personnalisation (facultatif) : exporter la variable dans le shell ou créer
# un fichier .env à côté de ce fichier — elle sera prise en priorité. CHANGEZ
# ADMIN_PASSWORD pour une instance exposée sur Internet.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Dans le conteneur la base vit toujours sous /app/data
      - DATABASE_URL=file:./data/cybermarkettrack.db
      # Aucun mot de passe admin par défaut : le compte est créé à la première
      # connexion (page /login) en choisissant identifiant + mot de passe.
      - FRESHNESS_MONTHS=${FRESHNESS_MONTHS:-12}
      - AUTH_TRUST_HOST=true
      # Laissé vide -> généré et persisté au 1er démarrage (data/.auth_secret).
      - AUTH_SECRET=${AUTH_SECRET:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

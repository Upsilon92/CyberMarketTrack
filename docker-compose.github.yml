# CyberMarketTrack — déploiement depuis GitHub (sans cloner le dépôt).
#
# Usage sur le serveur :
#   1. Copier CE fichier + un fichier .env (voir .env.example / README §2)
#   2. mkdir -p data
#   3. docker compose -f docker-compose.github.yml up -d --build
#
# Le contexte de build pointe directement sur le dépôt GitHub (branche main),
# dont la racine contient le Dockerfile. Pour mettre à jour après un push :
# `docker compose -f docker-compose.github.yml up -d --build` (ajouter
# `--pull` / `--no-cache` si besoin de forcer la reconstruction).
services:
  app:
    build:
      context: "https://github.com/Upsilon92/CyberMarketTrack.git#main"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:./data/cybermarkettrack.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

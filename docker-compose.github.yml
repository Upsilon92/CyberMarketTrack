# CyberMarketTrack — déploiement depuis GitHub, sans cloner ni préparer de .env.
#
# Usage sur le serveur (copier CE SEUL fichier suffit) :
#   docker compose -f docker-compose.github.yml up -d --build
#
# Le contexte de build pointe directement sur le dépôt GitHub (branche main),
# dont la racine contient le Dockerfile. Aucun .env requis : valeurs par défaut
# ci-dessous + AUTH_SECRET généré et persisté au 1er démarrage (data/.auth_secret).
# Mise à jour après un push : relancer la même commande (ajouter `--pull` /
# `--no-cache` pour forcer la reconstruction). CHANGEZ ADMIN_PASSWORD en prod.
services:
  app:
    build:
      context: "https://github.com/Upsilon92/CyberMarketTrack.git#main"
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/cybermarkettrack.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe!2026}
      - FRESHNESS_MONTHS=${FRESHNESS_MONTHS:-12}
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=${AUTH_SECRET:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
